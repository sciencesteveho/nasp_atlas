# Category schema for collapsing raw CELLxGENE metadata labels.
#
# Optional cosmetic labels used in plot legends/sidebars. If omitted, labels are
# generated from category keys, e.g."liver_biliary" -> "Liver biliary".
display_names:
  liver_biliary: Liver & biliary
  blood_immune: Blood & immune
  skeletal_muscle: Skeletal muscle
  inflammatory_autoimmune: Inflammatory / autoimmune
  neurologic_other: Neurologic (other)
  developmental_genetic: Developmental / genetic
  fibrosis_injury: Fibrosis / injury
  eye_disease: Eye disease

# Pattern order is significant.
# The first matching category wins, so specific terms must appear before
# broader substring catch-alls.
disease:
  # If true, the category key "normal" only matches the exact raw label
  # "normal". This prevents labels such as "normal pressure hydrocephalus" from
  # being classified as normal.
  match_normal_exactly: true

  patterns:
    cancer:
    - cancer
    - carcinoma
    - melanoma
    - neoplasm
    - tumor
    - tumour
    - glioblastoma
    - blastoma
    - leukemia
    - leukaemia
    - lymphoma
    - myeloma
    - sarcoma
    - adenoma
    - astrocytoma
    - oncocytoma

    metabolic:
    - diabetes
    - prediabetes
    - obesity
    - fatty liver
    - steatohepatitis
    - steatosis
    - non-alcoholic fatty
    - metabolic syndrome
    - dyslipidemia

    # Must precede normal so "normal pressure hydrocephalus" is not normal.
    neurodegeneration:
    - alzheimer
    - parkinson
    - lewy body
    - frontotemporal
    - tauopathy
    - amyotrophic lateral sclerosis
    - huntington
    - motor neuron

default_install_hook_types:
  - pre-commit
  - pre-push

repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: Ruff lint
        entry: ruff check . --fix
        language: system
        pass_filenames: false
        stages:
          - pre-commit

      - id: ruff-format
        name: Ruff format
        entry: ruff format .
        language: system
        pass_filenames: false
        stages:
          - pre-commit

      - id: ruff-check-ci
        name: Ruff lint check
        entry: ruff check .
        language: system
        pass_filenames: false
        always_run: true
        stages:
          - pre-push

      - id: ruff-format-ci
        name: Ruff format check
        entry: ruff format --check .
        language: system
        pass_filenames: false
        always_run: true
        stages:
          - pre-push

      - id: pytest
        name: Pytest
        entry: pytest
        language: system
        pass_filenames: false
        always_run: true
        stages:
          - pre-push
